<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inconspicuous CSV Formatter</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1A365D;
            text-align: center;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #eef2f5;
            border-radius: 6px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        select, input[type="file"], input[type="date"], button {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        select {
            flex-grow: 1;
            max-width: 800px;
        }
        button {
            background-color: #1A365D;
            color: white;
            cursor: pointer;
            border: none;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2c5282;
        }
        .graphs-wrapper {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .chart-container {
            position: relative;
            height: 40vh;
            width: 100%;
            border: 1px solid #eaeaea;
            padding: 10px;
            border-radius: 8px;
            box-sizing: border-box;
        }
        h3 {
            text-align: center;
            margin: 0 0 10px 0;
            color: #4a5568;
        }
        #warning {
            color: #d9534f;
            font-size: 12px;
            text-align: center;
            margin-top: -10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Internal Population Tracker</h1>
    <p id="warning">CLIENT-SIDE ONLY. DO NOT UPLOAD CSV FILES TO GITHUB.</p>

    <div class="controls">
        <div class="control-group">
            <label for="csvFileInput"><strong>1. Load Data:</strong></label>
            <input type="file" id="csvFileInput" accept=".csv" />
        </div>
        
        <div class="control-group">
            <label for="setSelector"><strong>2a. Filter by Set:</strong></label>
            <select id="setSelector" disabled>
                <option value="">Upload CSV first...</option>
            </select>
        </div>

        <div class="control-group">
            <label for="cardSelector"><strong>2b. Select Card:</strong></label>
            <select id="cardSelector" disabled>
                <option value="">Select a Set first...</option>
            </select>
        </div>

        <div class="control-group">
            <label><strong>3. Presets:</strong></label>
            <button onclick="updateChart(7)">Last 7 Days</button>
            <button onclick="updateChart(14)">Fortnight (14 Days)</button>
            <button onclick="updateChart(30)">Last 30 Days</button>
            <button onclick="updateChart(0)">All Time</button>
        </div>

        <div class="control-group">
            <label><strong>Custom Range:</strong></label>
            <input type="date" id="startDate">
            <span>to</span>
            <input type="date" id="endDate">
            <button onclick="applyCustomDateRange()" style="background-color: #2b6cb0;">Apply Range</button>
        </div>
    </div>

    <div class="graphs-wrapper">
        <div class="chart-container">
            <h3>Cumulative Total Population</h3>
            <canvas id="totalPopChart"></canvas>
        </div>
        <div class="chart-container">
            <h3>Daily Population Change (New Additions)</h3>
            <canvas id="dailyChangeChart"></canvas>
        </div>
    </div>
</div>

<script>
    let rawData = [];
    let uniqueSets = {}; 
    let allCardData = []; // Holds the processed history for the currently selected card
    let myTotalChart = null;
    let myDailyChart = null;
    let currentCardDetails = "";

    // Helper: Extracts set name by grabbing everything before the card number
    function extractSetFromName(cardName) {
        if (!cardName) return "Unknown Set";
        const match = cardName.match(/^(.*?)(?=\s\d{1,4}\s)/);
        return match ? match[1] : "Other Cards";
    }

    // 1. Handle File Upload
    document.getElementById('csvFileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                rawData = results.data;
                processSets();
            }
        });
    });

    // 2. Process Data into Sets and Populate Dropdown
    function processSets() {
        uniqueSets = {};
        
        rawData.forEach(item => {
            const cardName = item['Card Details'];
            if (!cardName) return;
            
            const setName = extractSetFromName(cardName);
            if (!uniqueSets[setName]) {
                uniqueSets[setName] = new Set();
            }
            uniqueSets[setName].add(cardName);
        });

        const setSelector = document.getElementById('setSelector');
        setSelector.innerHTML = '<option value="">-- Select a Set --</option>';
        
        Object.keys(uniqueSets).sort().forEach(set => {
            const option = document.createElement('option');
            option.value = set;
            option.textContent = set;
            setSelector.appendChild(option);
        });

        setSelector.disabled = false;

        setSelector.addEventListener('change', function(e) {
            populateCardDropdown(e.target.value);
        });
    }

    // 3. Populate Cards based on selected Set
    function populateCardDropdown(selectedSet) {
        const cardSelector = document.getElementById('cardSelector');
        cardSelector.innerHTML = '<option value="">-- Select a Card --</option>';
        
        if (!selectedSet || !uniqueSets[selectedSet]) {
            cardSelector.disabled = true;
            return;
        }

        const cards = Array.from(uniqueSets[selectedSet]).sort();
        cards.forEach(card => {
            const option = document.createElement('option');
            option.value = card;
            option.textContent = card;
            cardSelector.appendChild(option);
        });

        cardSelector.disabled = false;

        cardSelector.addEventListener('change', function(e) {
            currentCardDetails = e.target.value;
            if(currentCardDetails) {
                prepareCardData();
                updateChart(0); // Default to All Time when new card selected
            }
        });
    }

    // 4. Pre-calculate Daily Deltas for the Selected Card
    function prepareCardData() {
        allCardData = rawData.filter(item => item['Card Details'] === currentCardDetails);
        
        // Sort chronologically
        allCardData.sort((a, b) => new Date(a.Date) - new Date(b.Date));

        // Calculate deltas
        allCardData.forEach((item, index) => {
            let currentTotal = parseInt(item['Total Pop']) || 0;
            let current10 = parseInt(item['PSA 10 Pop']) || 0;
            
            if (index === 0) {
                item.deltaTotal = 0;
                item.delta10 = 0;
            } else {
                let prevTotal = parseInt(allCardData[index-1]['Total Pop']) || 0;
                let prev10 = parseInt(allCardData[index-1]['PSA 10 Pop']) || 0;
                item.deltaTotal = currentTotal - prevTotal;
                item.delta10 = current10 - prev10;
            }
        });
    }

    // 5. Preset Timeframe Update
    function updateChart(days) {
        if (!currentCardDetails || allCardData.length === 0) return;

        let displayData = [...allCardData];

        if (days > 0) {
            displayData = displayData.slice(-days);
        }

        renderCharts(displayData);
    }

    // 6. Custom Date Range Update
    function applyCustomDateRange() {
        if (!currentCardDetails || allCardData.length === 0) return;
        
        let startVal = document.getElementById('startDate').value;
        let endVal = document.getElementById('endDate').value;
        
        if(!startVal || !endVal) {
            alert("Please select both a start and end date.");
            return;
        }

        // Add time suffix to prevent timezone shifting issues
        let startDate = new Date(startVal + 'T00:00:00');
        let endDate = new Date(endVal + 'T23:59:59');

        let displayData = allCardData.filter(item => {
            let itemDate = new Date(item.Date + 'T00:00:00');
            return itemDate >= startDate && itemDate <= endDate;
        });

        if (displayData.length === 0) {
            alert("No data found in this date range.");
            return;
        }

        renderCharts(displayData);
    }

    // 7. Render Both Charts
    function renderCharts(dataArray) {
        const labels = dataArray.map(item => item.Date);
        
        const totalPopData = dataArray.map(item => parseInt(item['Total Pop']) || 0);
        const psa10Data = dataArray.map(item => parseInt(item['PSA 10 Pop']) || 0);
        
        const deltaTotalData = dataArray.map(item => item.deltaTotal);
        const delta10Data = dataArray.map(item => item.delta10);

        // Chart 1: Cumulative Total (Line)
        if (myTotalChart) myTotalChart.destroy();
        myTotalChart = new Chart(document.getElementById('totalPopChart').getContext('2d'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Total Pop', data: totalPopData, borderColor: '#1A365D', backgroundColor: 'rgba(26, 54, 93, 0.1)', borderWidth: 2, fill: true, tension: 0.1 },
                    { label: 'PSA 10 Pop', data: psa10Data, borderColor: '#e53e3e', backgroundColor: 'transparent', borderWidth: 2, fill: false, tension: 0.1 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false } }
        });

        // Chart 2: Daily Change (Bar)
        if (myDailyChart) myDailyChart.destroy();
        myDailyChart = new Chart(document.getElementById('dailyChangeChart').getContext('2d'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: 'New Total Pop Added', data: deltaTotalData, backgroundColor: 'rgba(26, 54, 93, 0.7)' },
                    { label: 'New PSA 10s Added', data: delta10Data, backgroundColor: 'rgba(229, 62, 62, 0.8)' }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false } }
        });
    }
</script>

</body>
</html>
